name: Episteme CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      max-parallel: 1
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
      fail-fast: false # Don't cancel other OS jobs if one fails

    env:
      MAVEN_OPTS: "-Dhttp.keepAlive=false -Dmaven.wagon.http.pool=false -Dmaven.wagon.http.retryHandler.count=3 -Dmaven.wagon.httpconnectionManager.ttlSeconds=120"

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 25
      uses: actions/setup-java@v4
      with:
        java-version: '25'
        distribution: 'oracle'
        cache: maven

    - name: Install MPJ to Maven Local
      shell: bash
      run: |
        mvn -B install:install-file -Dfile="libs/mpj.jar" -DgroupId=org.mpjexpress -DartifactId=mpj -Dversion=0.44 -Dpackaging=jar
        mvn -B install:install-file -Dfile="libs/mpi.jar" -DgroupId=org.mpjexpress -DartifactId=mpi -Dversion=0.44 -Dpackaging=jar

    - name: Build with Maven
      # Currently skips tests because they are known to be broken.
      # TODO: Re-enable tests once Unit Tests are fixed.
      shell: bash
      run: mvn -B -T 1C package -DskipTests -Djacoco.skip=true --file pom.xml

    - name: Run Benchmarks (CLI)
      # Run benchmarks and export JSON. 
      # Note: Native libs for HDF5/OpenCL might be missing on GitHub runners, 
      # but checks should skip them gracefully.
      shell: bash
      continue-on-error: true
      run: |
        java --add-modules jdk.incubator.vector --enable-native-access=ALL-UNNAMED \
        -cp "episteme-benchmarks/target/episteme-benchmarks-1.0.0-beta1.jar:episteme-benchmarks/target/lib/*" \
        org.episteme.benchmarks.cli.BenchmarkCLI --run-all --export-file benchmark-results.json

    - name: Upload Benchmark Results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: benchmark-results-${{ matrix.os }}
        path: benchmark-results.json

    - name: Upload Test Results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results-${{ matrix.os }}
        path: |
          **/target/surefire-reports/*.xml
          **/target/failsafe-reports/*.xml
