apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: episteme-ingress
  namespace: episteme
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "100m"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  tls:
    - hosts:
        - api.episteme.io
        - dashboard.episteme.io
        - grafana.episteme.io
      secretName: episteme-tls
  rules:
    - host: api.episteme.io
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: episteme-server
                port:
                  number: 8080
    - host: dashboard.episteme.io
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: episteme-dashboard
                port:
                  number: 3000
    - host: grafana.episteme.io
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: grafana
                port:
                  number: 3000
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: episteme-network-policy
  namespace: episteme
spec:
  podSelector:
    matchLabels:
      app: episteme-server
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: episteme-worker
        - podSelector:
            matchLabels:
              app: prometheus
        - namespaceSelector:
            matchLabels:
              name: ingress-nginx
      ports:
        - protocol: TCP
          port: 50051
        - protocol: TCP
          port: 8080
        - protocol: TCP
          port: 9090
  egress:
    - to:
        - podSelector: {}
      ports:
        - protocol: TCP
          port: 50051
