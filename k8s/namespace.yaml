apiVersion: v1
kind: Namespace
metadata:
  name: episteme
  labels:
    app.kubernetes.io/name: episteme
    app.kubernetes.io/part-of: episteme-grid
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: episteme-config
  namespace: episteme
data:
  GRPC_PORT: "50051"
  METRICS_PORT: "9090"
  REST_PORT: "8080"
  LOG_LEVEL: "INFO"
  MAX_WORKERS: "100"
  QUEUE_SIZE: "10000"
---
apiVersion: v1
kind: Secret
metadata:
  name: episteme-secrets
  namespace: episteme
type: Opaque
stringData:
  JWT_SECRET: "Episteme-Super-Secret-Key-For-JWT-2024!"
  DB_PASSWORD: "change-me-in-production"
